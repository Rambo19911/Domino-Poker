<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Main-lobby fons. Pašlaik: vektora radials (zaļš centrs -> tumša mala), kas atbilst
       esošajam .lobbyShell gradientam. Nākotnē: aizvietot ar domino/pokera tekstūru. -->
  <defs>
    <radialGradient id="lobby" cx="50%" cy="36%" r="75%">
      <stop offset="0%" stop-color="#1c5641"/>
      <stop offset="58%" stop-color="#1e2622"/>
      <stop offset="100%" stop-color="#1e2622"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#lobby)"/>
</svg>
