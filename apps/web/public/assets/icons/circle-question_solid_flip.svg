<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="fa-flip"><style>
    @keyframes fa-beat {
      0%, 90% { transform: scale(1); }
      45% { transform: scale(1.25); }
    }
    @keyframes fa-beat-fade {
      0%, 100% { opacity: .4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.125); }
    }
    @keyframes fa-bounce {
      0% { transform: translateY(0); }
      10% { transform: translateY(0); }
      30% { transform: translateY(-.5em); }
      50% { transform: translateY(0); }
      70% { transform: translateY(-.25em); }
      80% { transform: translateY(0); }
      100% { transform: translateY(0); }
    }
    @keyframes fa-fade {
      0%, 100% { opacity: .4; }
      50% { opacity: 1; }
    }
    @keyframes fa-flip {
      50% { transform: rotate3d(0, 1, 0, -180deg); }
    }
    @keyframes fa-shake {
      0% { transform: rotate(-15deg); }
      4% { transform: rotate(15deg); }
      8%, 24% { transform: rotate(-18deg); }
      12%, 28% { transform: rotate(18deg); }
      16% { transform: rotate(-22deg); }
      20% { transform: rotate(22deg); }
      32% { transform: rotate(-12deg); }
      36% { transform: rotate(12deg); }
      40%, 100% { transform: rotate(0deg); }
    }
    @keyframes fa-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fa-beat { animation: fa-beat 1s infinite; transform-origin: center; }
    .fa-beat-fade { animation: fa-beat-fade 1s infinite; transform-origin: center; }
    .fa-bounce { animation: fa-bounce 1s infinite; transform-origin: center; }
    .fa-fade { animation: fa-fade 1s infinite; }
    .fa-flip { animation: fa-flip 2s infinite linear; transform-origin: center; }
    .fa-shake { animation: fa-shake 1s infinite; transform-origin: center; }
    .fa-spin { animation: fa-spin 2s infinite linear; transform-origin: center; }
    .fa-spin-reverse { animation: fa-spin 2s infinite linear reverse; transform-origin: center; }
    .fa-spin-pulse { animation: fa-spin 1s infinite steps(8); transform-origin: center; }
  </style><path fill="currentColor" d="M320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM320 240C302.3 240 288 254.3 288 272C288 285.3 277.3 296 264 296C250.7 296 240 285.3 240 272C240 227.8 275.8 192 320 192C364.2 192 400 227.8 400 272C400 319.2 364 339.2 344 346.5L344 350.3C344 363.6 333.3 374.3 320 374.3C306.7 374.3 296 363.6 296 350.3L296 342.2C296 321.7 310.8 307 326.1 302C332.5 299.9 339.3 296.5 344.3 291.7C348.6 287.5 352 281.7 352 272.1C352 254.4 337.7 240.1 320 240.1zM288 432C288 414.3 302.3 400 320 400C337.7 400 352 414.3 352 432C352 449.7 337.7 464 320 464C302.3 464 288 449.7 288 432z"/></svg>